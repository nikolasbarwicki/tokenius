pre-commit:
  parallel: true
  commands:
    lint:
      run: bun run lint
    format:
      run: bun run format:check
    typecheck:
      run: bun run typecheck
    test:
      run: bun test
    knip:
      run: bun run knip

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
